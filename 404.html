<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect SPA routes to index.html preserving the path
      const repo = '/OptiRuta';
      const path = window.location.pathname.replace(repo, '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
