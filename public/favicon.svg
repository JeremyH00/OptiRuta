<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo circular azul oscuro -->
  <rect width="32" height="32" rx="8" fill="#1e3a8a"/>
  <!-- Ruta curva principal -->
  <path d="M7 23 C9 17, 14 18, 16 16 C18 14, 20 13, 25 9"
        stroke="#60a5fa" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Punto de origen (abajo izquierda) -->
  <circle cx="7" cy="23" r="2.5" fill="#34d399"/>
  <!-- Punto destino (arriba derecha) -->
  <circle cx="25" cy="9" r="2.5" fill="#f59e0b"/>
  <!-- Waypoint intermedio -->
  <circle cx="16" cy="16" r="1.8" fill="white" opacity="0.9"/>
  <!-- Pequeña flecha en el destino -->
  <path d="M22 7 L25 9 L23 12" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>